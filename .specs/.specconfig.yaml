project: Iris
description: Self-hosted image search and organizer with metadata extraction,
  thumbnails, and smart browsing
spec_dir: .specs/features
templates:
  - feature
standards:
  techstack:
    frontend: React 19, Vite, Tailwind CSS, shadcn/ui
    backend: Bun, Hono
    database: PostgreSQL, Drizzle ORM
    maps: Leaflet
    images: sharp (thumbnails/conversion), exifr (metadata extraction)
  personas:
    - name: User
      description: A single user sets up Iris, syncs their photo collection, and
        explores/organizes their images through browsing, searching, tagging,
        and map/timeline views.
  conventions:
    prefer:
      - Single-user application, no auth/roles
      - Source folders are read-only — never write to them
      - Work folder mirrors source folder structure
      - WebP thumbnails by default (configurable)
      - Light/dark mode via design system (docs/Design.md)
      - DM Sans for UI, Outfit for display headings
      - Folder-based navigation to limit displayed content
    avoid:
      - Writing any data to source folders
      - Loading all images at once — always paginate/virtualize
      - Storing thumbnails alongside originals
  requirements:
    require_acceptance_criteria: true
    require_technical_design: false
    max_tasks_per_feature: 10
  assumptions:
    - No authentication or login required — Iris runs locally for a single user
